<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" sizes="180x180" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="stylesheet" href="/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <title>GeoSurePath - Premium GPS Tracking</title>
    <style>
      .loader {
        position: fixed; inset: 0; margin: auto;
        width: 40px; aspect-ratio: 1; box-sizing: content-box; animation: ll 1s infinite linear;
        border-radius: 50%; border: 4px solid #38bdf8; border-right-color: transparent;
      }
      @keyframes ll {to{transform: rotate(1turn)}}
    </style>
  </head>
  <body>
    <noscript>Enable JavaScript to use <a href="https://geosurepath.com/">GeoSurePath Tracking System</a>.</noscript>
    <div id="root" class="root">
      <div class="loader"></div>
    </div>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script type="module" src="/src/index.jsx" onerror="alert('Loading error.')"></script>
  </body>
