services:
  db:
    image: postgres:15-alpine
    container_name: geosurepath_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-geosurepath}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-this-to-something-long-and-random}
      POSTGRES_DB: ${DB_NAME:-geosurepath}
    ports:
      - "5432:5432"
    command: ["postgres", "-c", "synchronous_commit=off", "-c", "max_wal_size=2GB", "-c", "checkpoint_timeout=15min", "-c", "shared_buffers=2GB", "-c", "work_mem=64MB"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-geosurepath}"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 2G
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: geosurepath_redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    volumes:
      - redis_data:/data

  traccar:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: geosurepath_traccar
    restart: always
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2.5G
    environment:
      - JAVA_OPTS=-Xms1g -Xmx2g
    ports:
      - "5001-5150:5001-5150/tcp"
      - "5001-5150:5001-5150/udp"
      - "8082:8082"  # Added for internal clarity
    volumes:
      - ./logs:/opt/traccar/logs:rw
      - ./data:/opt/traccar/data:rw
      - ./docker/traccar.xml:/opt/traccar/conf/traccar.xml:ro

  saas-api:
    build: ./saas
    container_name: geosurepath_saas_api
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      traccar:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 1G
    # No direct port exposure (Nginx only)
    env_file:
      - ./saas/.env
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-geosurepath}:${DB_PASSWORD:-change-this-to-something-long-and-random}@db:5432/${DB_NAME:-geosurepath}?schema=saas
      - REDIS_HOST=redis
      - TRACCAR_URL=http://traccar:8082
      - NODE_ENV=production

  nginx:
    image: nginx:alpine
    container_name: geosurepath_nginx
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
    ports:
      - "80:80"
      - "443:443"  # Added for future HTTPS
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      saas-api:
        condition: service_started
      traccar:
        condition: service_started

volumes:
  db_data:
  redis_data:
