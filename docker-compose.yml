services:
  db:
    image: postgres:15-alpine
    container_name: geosurepath_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-geosurepath}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-geosurepath}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-geosurepath} -d $${POSTGRES_DB:-geosurepath}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: geosurepath_redis
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data

  traccar:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: geosurepath_traccar
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5001-5150:5001-5150/tcp"
      - "5001-5150:5001-5150/udp"
    volumes:
      - ./logs:/opt/traccar/logs:rw
      - ./data:/opt/traccar/data:rw
      - ./docker/traccar.xml:/opt/traccar/conf/traccar.xml:ro

  saas-api:
    build: ./saas
    container_name: geosurepath_saas_api
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      traccar:
        condition: service_started
    # No direct port exposure (Nginx only)
    env_file:
      - ./saas/.env
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-geosurepath}:${DB_PASSWORD}@db:5432/${DB_NAME:-geosurepath}?schema=saas
      - REDIS_HOST=redis
      - TRACCAR_URL=http://traccar:8082

  nginx:
    image: nginx:alpine
    container_name: geosurepath_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      saas-api:
        condition: service_started
      traccar:
        condition: service_started

volumes:
  db_data:
  redis_data:
