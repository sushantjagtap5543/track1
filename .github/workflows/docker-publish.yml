# ⚠️  DISABLED — functionality merged into main.yml (3-job pipeline)
# This file is kept for reference only.
# The env:REGISTRY bug (should be env.REGISTRY) was also present here.
name: CI/CD Docker Pipeline (DISABLED)

on:
  workflow_dispatch:  # Manual trigger only — disabled from auto-run

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into registry ${{ env:REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env:REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata for Traccar
        id: meta-traccar
        uses: docker/metadata-action@v5
        with:
          images: ${{ env:REGISTRY }}/${{ github.repository }}/traccar
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha

      - name: Build and push Traccar
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/traccar.Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-traccar.outputs.tags }}
          labels: ${{ steps.meta-traccar.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract Docker metadata for SaaS API
        id: meta-saas
        uses: docker/metadata-action@v5
        with:
          images: ${{ env:REGISTRY }}/${{ github.repository }}/saas-api
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha

      - name: Build and push SaaS API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/saas.Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-saas.outputs.tags }}
          labels: ${{ steps.meta-saas.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
