name: GeoSurePath CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  TRACCAR_IMAGE: ghcr.io/${{ github.repository }}/traccar
  SAAS_IMAGE: ghcr.io/${{ github.repository }}/saas-api

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Test & Lint
  # ─────────────────────────────────────────────
  test:
    name: 🧪 Test & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: saas/package-lock.json

      - name: Install SaaS dependencies
        run: cd saas && npm ci

      - name: Lint SaaS API
        run: cd saas && npm run lint || echo "⚠️ Linting skipped (no lint script)"

      - name: Validate Prisma schema
        run: cd saas && npx prisma validate

  # ─────────────────────────────────────────────
  # Job 2: Build & Push Docker Images to GHCR
  # ─────────────────────────────────────────────
  build-and-push:
    name: 🐳 Build & Push Images
    runs-on: ubuntu-latest
    needs: test
    # Only push on real pushes to main (not PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.sha_tag }}

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tag
        id: meta
        run: |
          SHA_TAG=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "sha_tag=${SHA_TAG}" >> $GITHUB_OUTPUT

      # ── Traccar Core ──
      - name: Build & Push Traccar
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/traccar.Dockerfile
          push: true
          tags: |
            ${{ env.TRACCAR_IMAGE }}:latest
            ${{ env.TRACCAR_IMAGE }}:${{ steps.meta.outputs.sha_tag }}
          cache-from: type=gha,scope=traccar
          cache-to: type=gha,scope=traccar,mode=max

      # ── SaaS API ──
      - name: Build & Push SaaS API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/saas.Dockerfile
          push: true
          tags: |
            ${{ env.SAAS_IMAGE }}:latest
            ${{ env.SAAS_IMAGE }}:${{ steps.meta.outputs.sha_tag }}
          cache-from: type=gha,scope=saas-api
          cache-to: type=gha,scope=saas-api,mode=max

  # ─────────────────────────────────────────────
  # Job 3: Deploy to AWS Lightsail
  # ─────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Lightsail
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          port: 22
          timeout: 120s
          command_timeout: 10m
          script: |
            set -e

            DEPLOY_DIR="${LIGHTSAIL_DEPLOY_PATH:-/home/ubuntu/track1}"
            echo "📂 Deploy directory: $DEPLOY_DIR"
            cd "$DEPLOY_DIR"

            echo "📥 Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            echo "🔑 Logging into GHCR..."
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
              -u "${{ github.actor }}" --password-stdin

            echo "📦 Pulling new Docker images..."
            cd deploy
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull

            echo "♻️  Restarting services..."
            docker compose -f docker-compose.yml -f docker-compose.prod.yml \
              up -d --remove-orphans --no-build

            echo "⏳ Waiting for Traccar health check..."
            for i in $(seq 1 12); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8082/api/server || echo "000")
              if [ "$STATUS" = "200" ] || [ "$STATUS" = "401" ]; then
                echo "✅ Traccar is healthy (HTTP $STATUS)"
                break
              fi
              if [ "$i" = "12" ]; then
                echo "❌ Health check failed after 60s. Rolling back..."
                docker compose -f docker-compose.yml -f docker-compose.prod.yml \
                  up -d --no-build
                exit 1
              fi
              echo "   Attempt $i/12 — HTTP $STATUS — retrying in 5s..."
              sleep 5
            done

            echo "⏳ Waiting for SaaS API health check..."
            for i in $(seq 1 6); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/api/health || echo "000")
              if [ "$STATUS" = "200" ]; then
                echo "✅ SaaS API is healthy (HTTP $STATUS)"
                break
              fi
              if [ "$i" = "6" ]; then
                echo "⚠️ SaaS API health check timed out (non-fatal)"
              fi
              sleep 5
            done

            echo ""
            echo "🎉 Deployment complete!"
            echo "   Commit: ${{ github.sha }}"
            echo "   Actor:  ${{ github.actor }}"
            docker compose -f docker-compose.yml -f docker-compose.prod.yml ps
