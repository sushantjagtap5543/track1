name: GeoSurePath CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  TRACCAR_IMAGE: ghcr.io/${{ github.repository }}/traccar
  SAAS_IMAGE: ghcr.io/${{ github.repository }}/saas-api

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Test & Lint
  # ─────────────────────────────────────────────
  test:
    name: 🧪 Test & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: saas/package-lock.json

      - name: Install SaaS dependencies
        run: cd saas && npm ci

      - name: Lint SaaS API
        run: cd saas && npm run lint || echo "⚠️ Linting skipped (no lint script)"

      - name: Validate Prisma schema
        run: cd saas && npx prisma validate

  # ─────────────────────────────────────────────
  # Job 2: Build & Push Docker Images to GHCR
  # ─────────────────────────────────────────────
  build-and-push:
    name: 🐳 Build & Push Images
    runs-on: ubuntu-latest
    needs: test
    # Only push on real pushes to main (not PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.sha_tag }}

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tag
        id: meta
        run: |
          SHA_TAG=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "sha_tag=${SHA_TAG}" >> $GITHUB_OUTPUT

      # ── Traccar Core ──
      - name: Build & Push Traccar
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/traccar.Dockerfile
          push: true
          tags: |
            ${{ env.TRACCAR_IMAGE }}:latest
            ${{ env.TRACCAR_IMAGE }}:${{ steps.meta.outputs.sha_tag }}
          cache-from: type=gha,scope=traccar
          cache-to: type=gha,scope=traccar,mode=max

      # ── SaaS API ──
      - name: Build & Push SaaS API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/saas.Dockerfile
          push: true
          tags: |
            ${{ env.SAAS_IMAGE }}:latest
            ${{ env.SAAS_IMAGE }}:${{ steps.meta.outputs.sha_tag }}
          cache-from: type=gha,scope=saas-api
          cache-to: type=gha,scope=saas-api,mode=max

  # ─────────────────────────────────────────────
  # Job 3: Deploy to AWS Lightsail
  # ─────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Lightsail
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          port: 22
          timeout: 120s
          command_timeout: 10m
          script: |
            set -e

            DEPLOY_DIR="${LIGHTSAIL_DEPLOY_PATH:-/home/ubuntu/track1}"
            echo "📂 Deploy directory: $DEPLOY_DIR"
            
            if [ ! -d "$DEPLOY_DIR" ]; then
              echo "❌ Deploy directory not found. Please ensure it exists."
              exit 1
            fi

            cd "$DEPLOY_DIR"
            
            # Use the unified deploy script which handles code pull, image pull, restart, and database sync
            export DEPLOY_DIR="$DEPLOY_DIR"
            bash deploy/scripts/deploy.sh
