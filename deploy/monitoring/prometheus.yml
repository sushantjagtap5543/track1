global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'saas-api'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['saas-api:3001']

  - job_name: 'traccar'
    metrics_path: '/api/metrics'
    static_configs:
      - targets: ['traccar:8082']
