version: '3.8'

services:
  # --- Reverse Proxy & SSL ---
  proxy:
    image: nginxproxy/nginx-proxy
    container_name: geosurepath_proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
      - ./certs:/etc/nginx/certs
      - ./vhost.d:/etc/nginx/vhost.d
      - ./html:/usr/share/nginx/html
    networks:
      - frontend-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  acme-companion:
    image: nginxproxy/acme-companion
    container_name: geosurepath_acme
    restart: unless-stopped
    volumes_from:
      - proxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./acme:/etc/acme.sh
    depends_on:
      - proxy
    networks:
      - frontend-net

  # --- Database ---
  db:
    image: postgres:15-alpine
    container_name: geosurepath_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-geosurepath}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD_REQUIRED}
      POSTGRES_DB: ${DB_NAME:-geosurepath}
    command: 
      - "postgres"
      - "-c"
      - "synchronous_commit=off"
      - "-c"
      - "max_wal_size=4GB"
      - "-c"
      - "checkpoint_timeout=15min"
      - "-c"
      - "shared_buffers=1GB"
      - "-c"
      - "work_mem=128MB"
      - "-c"
      - "max_connections=200"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 4G
    volumes:
      - ./volumes/db_data:/var/lib/postgresql/data
    networks:
      - backend-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # --- Cache ---
  redis:
    image: redis:7-alpine
    container_name: geosurepath_redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./volumes/redis_data:/data
    networks:
      - backend-net

  # --- Traccar Server ---
  traccar:
    build:
      context: ..
      dockerfile: deploy/traccar.Dockerfile
    container_name: geosurepath_traccar
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
    environment:
      - JAVA_OPTS=-Xms1g -Xmx3g -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -Dtraccar.xml=/opt/traccar/conf/traccar.xml
      - VIRTUAL_HOST=${DOMAIN}
      - VIRTUAL_PORT=8082
      - LETSENCRYPT_HOST=${DOMAIN}
      - LETSENCRYPT_EMAIL=${SSL_EMAIL}
    ports:
      - "5001-5100:5001-5100/tcp"
      - "5001-5100:5001-5100/udp"
    volumes:
      - ../logs:/opt/traccar/logs:rw
      - ./volumes/traccar_data:/opt/traccar/data:rw
      - ../config/traccar/traccar.xml:/opt/traccar/conf/traccar.xml:ro
    networks:
      - backend-net
      - frontend-net
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # --- SaaS API ---
  saas-api:
    build:
      context: ..
      dockerfile: deploy/saas.Dockerfile
    container_name: geosurepath_saas_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      traccar:
        condition: service_started
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-geosurepath}:${DB_PASSWORD:?DB_PASSWORD_REQUIRED}@db:5432/${DB_NAME:-geosurepath}?schema=saas
      - REDIS_HOST=redis
      - TRACCAR_URL=http://traccar:8082
      - NODE_ENV=production
      - VIRTUAL_HOST=${DOMAIN}
      - VIRTUAL_PATH=/api/
      - VIRTUAL_DEST=/api/
    networks:
      - backend-net
      - frontend-net
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # --- Monitoring ---
  prometheus:
    image: prom/prometheus:latest
    container_name: geosurepath_prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./volumes/prometheus_data:/prometheus
    networks:
      - backend-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  backend-net:
    driver: bridge
  frontend-net:
    driver: bridge

volumes:
  # Using local bind mounts for easier management in this setup, 
  # but named volumes could also be used.
